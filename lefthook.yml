min_version: 2.1.0

# Skip hooks with `git commit --no-verify` or `LEFTHOOK=0 git commit ...`.
# Go-only contributors: `go install github.com/evilmartians/lefthook/v2@v2.1.0 && lefthook install`.
# Frontend/full-stack contributors: `pnpm install` in gui/frontend/ plus `lefthook install`.

# Execution model:
# - Top-level jobs (frontend, go) run in parallel — they touch disjoint file sets.
# - Within each group, jobs are piped so format runs before lint/logpolicy reads the file.
# - stage_fixed re-stages formatter output; lefthook serializes the git index updates.

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  jobs:
    - name: frontend
      root: "gui/frontend/"
      group:
        piped: true
        jobs:
          - name: format
            glob: "**/*.{ts,tsx,css,scss,json,md,html,yml,yaml}"
            run: pnpm exec prettier --write --cache --ignore-unknown {staged_files}
            stage_fixed: true
            fail_text: "Prettier failed. Fix the errors above or bypass with --no-verify."

          - name: lint
            glob: "**/*.{ts,tsx}"
            run: pnpm exec eslint --cache --no-error-on-unmatched-pattern {staged_files}
            fail_text: "ESLint failed. Fix errors above, or run `pnpm --dir gui/frontend run lint` locally."

    - name: go
      group:
        piped: true
        jobs:
          - name: format
            glob: "**/*.go"
            run: golangci-lint fmt {staged_files}
            stage_fixed: true
            fail_text: "golangci-lint fmt failed. See output above."

          - name: logpolicy
            glob:
              - "internal/*.go"
              - "internal/**/*.go"
            run: go run ./cmd/logpolicy
            fail_text: "Log policy check failed. Review log lines added/changed under internal/."

pre-push:
  parallel: true
  jobs:
    - name: frontend-typecheck
      root: "gui/frontend/"
      glob: "**/*.{ts,tsx}"
      run: pnpm run typecheck
      fail_text: "TypeScript typecheck failed. Run `pnpm --dir gui/frontend run typecheck`."

    - name: go-lint
      glob: "**/*.go"
      run: golangci-lint run --timeout=5m ./...
      fail_text: "golangci-lint failed. Run `golangci-lint run --timeout=5m ./...` locally."

commit-msg:
  jobs:
    - name: commit-message
      run: go run ./cmd/commitmsgcheck {1}
      fail_text: |
        Commit message does not follow Conventional Commits.
        Format: <type>(<scope>): <subject>   (scope optional)
        Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
        Examples:
          feat(config): add YAML loader
          fix: correct typo in README
          feat!: drop support for Go 1.19
        See https://www.conventionalcommits.org/
