name: build-binaries

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-binaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-cli:
    name: Build CLI (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm != '' && format('/{0}', matrix.goarm) || '' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            goarm: ""
          - goos: windows
            goarch: arm64
            goarm: ""
          - goos: linux
            goarch: amd64
            goarm: ""
          - goos: linux
            goarch: arm64
            goarm: ""
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: darwin
            goarch: amd64
            goarm: ""
          - goos: darwin
            goarch: arm64
            goarm: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CLI
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          mkdir -p dist/cli

          suffix=""
          if [[ "$GOOS" == "windows" ]]; then
            suffix=".exe"
          fi

          arm_suffix=""
          if [[ -n "${GOARM:-}" ]]; then
            arm_suffix="v${GOARM}"
          fi

          out="dist/cli/upbrr-${GOOS}-${GOARCH}${arm_suffix}${suffix}"
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/upbrr

      - name: Package CLI
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          set -euo pipefail
          mkdir -p dist/packages

          arm_suffix=""
          if [[ -n "${GOARM:-}" ]]; then
            arm_suffix="v${GOARM}"
          fi

          suffix=""
          if [[ "$GOOS" == "windows" ]]; then
            suffix=".exe"
          fi

          bin_name="upbrr-${GOOS}-${GOARCH}${arm_suffix}${suffix}"
          target="${GOOS}-${GOARCH}${arm_suffix}"

          if [[ "$GOOS" == "windows" ]]; then
            archive="dist/packages/upbrr-cli-${target}.zip"
            (cd dist/cli && zip -q -j "../packages/$(basename "$archive")" "$bin_name")
          else
            archive="dist/packages/upbrr-cli-${target}.tar.gz"
            tar -C dist/cli -czf "$archive" "$bin_name"
          fi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm != '' && format('v{0}', matrix.goarm) || '' }}
          path: dist/packages/upbrr-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm != '' && format('v{0}', matrix.goarm) || '' }}${{ matrix.goos == 'windows' && '.zip' || '.tar.gz' }}
          if-no-files-found: error

  build-gui:
    name: Build GUI (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows/amd64
            artifact: windows-x64
          - runner: windows-latest
            platform: windows/arm64
            artifact: windows-arm64
          - runner: ubuntu-22.04
            platform: linux/amd64
            artifact: linux-x64
          - runner: ubuntu-22.04-arm
            platform: linux/arm64
            artifact: linux-arm64
          - runner: macos-15-intel
            platform: darwin/amd64
            artifact: macos-x64
          - runner: macos-15
            platform: darwin/arm64
            artifact: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gui/frontend/pnpm-lock.yaml

      - name: Install GUI frontend dependencies
        shell: bash
        working-directory: gui/frontend
        run: pnpm install --frozen-lockfile

      - name: Build GUI frontend assets
        shell: bash
        working-directory: gui/frontend
        run: pnpm run build

      - name: Install Linux GUI dependencies
        if: startsWith(matrix.platform, 'linux/')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libglib2.0-dev \
            libx11-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            pkg-config \
            patchelf

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      - name: Build GUI
        shell: bash
        run: |
          set -euo pipefail
          cd gui
          if [[ "${{ matrix.platform }}" == "windows/arm64" ]]; then
            # Wails bindings helper is built for target arch; skip on x64 runners for arm64 target.
            wails build -platform "${{ matrix.platform }}" -clean -skipbindings
          else
            wails build -platform "${{ matrix.platform }}" -clean
          fi

      - name: Package GUI (Windows)
        if: startsWith(matrix.platform, 'windows/')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/packages | Out-Null
          $target = "${{ matrix.artifact }}"
          $archive = "dist/packages/upbrr-gui-$target.zip"
          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }
          Compress-Archive -Path "gui/build/bin/*" -DestinationPath $archive -Force

      - name: Package GUI (Linux/macOS)
        if: ${{ !startsWith(matrix.platform, 'windows/') }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/packages
          target="${{ matrix.artifact }}"
          archive="dist/packages/upbrr-gui-${target}.tar.gz"
          tar -C gui/build/bin -czf "$archive" .

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: gui-${{ matrix.artifact }}
          path: dist/packages/upbrr-gui-${{ matrix.artifact }}${{ startsWith(matrix.platform, 'windows/') && '.zip' || '.tar.gz' }}
          if-no-files-found: error

  build-docker:
    name: Build Docker Image (cli+gui)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (Combined)
        id: meta_combined
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ua
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push combined image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_combined.outputs.tags }}
          labels: ${{ steps.meta_combined.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
